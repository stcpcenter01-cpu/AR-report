const CREDIT_TYPES=new Set(["ลดหนี้-อื่นๆ","ลดหนี้-รับคืน","เงินล่วงหน้า","เงินล่วงหน้า (เงินเกิน)"]);
const fmt=n=>"฿"+Math.abs(n).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});

function pillClass(type){
  if(CREDIT_TYPES.has(type)) return "p-cr";
  if(type.includes("บริการ")) return "p-svc";
  if(type.includes("ล่วงหน้า")) return "p-advance";
  return "p-sale";
}

const todayMs = new Date().setHours(0,0,0,0);
function isOverdue(dueStr){
  if(!dueStr||dueStr==="-") return false;
  const p=dueStr.split("/");
  if(p.length!==3) return false;
  const dt=new Date(Number(p[2])-543, Number(p[1])-1, Number(p[0]));
  return dt.getTime()<todayMs;
}

const shops=[...new Set(DATA.map(r=>r.shop))].sort((a,b)=>a.localeCompare(b,"th"));
const sel=document.getElementById("sel");
shops.forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;sel.appendChild(o);});

function renderRows(tbody,list){
  if(!list.length){tbody.innerHTML='<tr><td colspan="5" class="empty">ไม่มีรายการ</td></tr>';return;}
  tbody.innerHTML=list.map(r=>{
    const od=isOverdue(r.due);
    const dueCell=od?'<span class="overdue">'+r.due+' ⚠</span>':r.due;
    const amt=r.amount<0?'<span class="c-red">('+fmt(r.amount)+')</span>':fmt(r.amount);
    return '<tr><td>'+r.docNo+'</td><td><span class="pill '+pillClass(r.type)+'">'+r.type+'</span></td><td>'+r.date+'</td><td>'+dueCell+'</td><td class="r">'+amt+'</td></tr>';
  }).join("");
}

  const inv=shopRows.filter(r=>!CREDIT_TYPES.has(r.type));
  const cr=shopRows.filter(r=>CREDIT_TYPES.has(r.type));
  const sI=inv.reduce((a,r)=>a+r.amount,0);
  const sC=cr.reduce((a,r)=>a+r.amount,0);
  document.getElementById("s1").textContent=fmt(sI);
  document.getElementById("s2").textContent=fmt(sC);
  document.getElementById("s3").textContent=fmt(sI+sC);
  renderRows(document.getElementById("b1"),inv);
  renderRows(document.getElementById("b2"),cr);
  document.getElementById("main").style.display="";
  document.getElementById("ph").style.display="none";
});
</script>
</body></html>
