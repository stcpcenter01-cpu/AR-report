<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ยอดลูกหนี้</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Sarabun,sans-serif;font-size:15px;color:#222;background:#f5f5f3;padding:0}
.header{background:#fff;padding:1rem 1.25rem;border-bottom:1px solid #e5e5e3}
.header h1{font-size:18px;font-weight:500}
.header p{font-size:13px;color:#888;margin-top:2px}
.controls{background:#fff;padding:.75rem 1.25rem;border-bottom:1px solid #e5e5e3;display:flex;align-items:center;gap:10px}
.controls label{font-size:13px;color:#666;white-space:nowrap}
select{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px;background:#fff;font-family:inherit;max-width:280px;width:100%}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:1rem 1.25rem}
.card{background:#fff;border-radius:8px;padding:.875rem 1rem}
.card .lbl{font-size:12px;color:#888;margin-bottom:4px}
.card .amt{font-size:18px;font-weight:500}
.card.c-inv .amt{color:#185fa5}
.card.c-cr .amt{color:#a32d2d}
.card.c-net .amt{color:#0f6e56}
.section{padding:0 1.25rem 1.25rem}
.sec-title{font-size:13px;font-weight:500;color:#666;margin-bottom:8px;padding-top:.5rem}
.tbl-wrap{background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e5e5e3}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:#888;font-weight:400;border-bottom:1px solid #e5e5e3;font-size:12px}
td{padding:8px 10px;border-bottom:1px solid #f0f0ee;color:#333}
tr:last-child td{border-bottom:none}
td.r{text-align:right}th.r{text-align:right}
.pill{display:inline-block;font-size:11px;padding:2px 7px;border-radius:99px}
.p-inv{background:#e6f1fb;color:#185fa5}
.p-cr{background:#fcebeb;color:#a32d2d}
.p-svc{background:#eaf3de;color:#3b6d11}
.c-red{color:#a32d2d}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.placeholder{text-align:center;padding:3rem 1rem;color:#aaa;font-size:14px}
@media(max-width:480px){.summary{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <h1>📋 ติดตามยอดลูกหนี้</h1>
  <p>อัปเดต: 26/06/2569</p>
</div>
<div class="controls">
  <label for="sel">เลือกร้านค้า</label>
  <select id="sel"><option value="">— กรุณาเลือก —</option></select>
</div>
<div id="main" style="display:none">
  <div class="summary">
    <div class="card c-inv"><div class="lbl">ใบขาย + ค่าบริการ</div><div class="amt" id="s1">฿0</div></div>
    <div class="card c-cr"><div class="lbl">ใบลดหนี้</div><div class="amt" id="s2">฿0</div></div>
    <div class="card c-net"><div class="lbl">ยอดสุทธิ</div><div class="amt" id="s3">฿0</div></div>
  </div>
  <div class="section">
    <div class="sec-title">ใบขาย / ค่าบริการ</div>
    <div class="tbl-wrap"><table><thead><tr>
      <th>เลขที่เอกสาร</th><th>ประเภท</th><th>วันที่</th><th>ครบกำหนด</th><th class="r">จำนวนเงิน</th>
    </tr></thead><tbody id="b1"></tbody></table></div>
  </div>
  <div class="section" style="margin-top:.5rem">
    <div class="sec-title">ใบลดหนี้</div>
    <div class="tbl-wrap"><table><thead><tr>
      <th>เลขที่เอกสาร</th><th>ประเภท</th><th>วันที่</th><th>ครบกำหนด</th><th class="r">จำนวนเงิน</th>
    </tr></thead><tbody id="b2"></tbody></table></div>
  </div>
</div>
<div id="ph" class="placeholder">🏪<br><br>เลือกร้านค้าเพื่อดูยอดลูกหนี้</div>
<script>
const DATA=[];
const fmt=n=>"฿"+Math.abs(n).toLocaleString("th-TH",{minimumFractionDigits:2});
const shops=[...new Set(DATA.map(r=>r.shop))].sort();
const sel=document.getElementById("sel");
shops.forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;sel.appendChild(o);});
function rows(tbody,list){
  if(!list.length){tbody.innerHTML='<tr><td colspan="5" class="empty">ไม่มีรายการ</td></tr>';return;}
  tbody.innerHTML=list.map(r=>{
    const pc=r.type==="ใบลดหนี้"?"p-cr":r.type==="ค่าบริการ"?"p-svc":"p-inv";
    const amt=r.amount<0?'<span class="c-red">('+fmt(r.amount)+')</span>':fmt(r.amount);
    return '<tr><td>'+r.docNo+'</td><td><span class="pill '+pc+'">'+r.type+'</span></td><td>'+r.date+'</td><td>'+r.due+'</td><td class="r">'+amt+'</td></tr>';
  }).join("");
}
sel.addEventListener("change",()=>{
  const s=sel.value;
  if(!s){document.getElementById("main").style.display="none";document.getElementById("ph").style.display="";return;}
  const inv=DATA.filter(r=>r.shop===s&&r.type!=="ใบลดหนี้");
  const cr=DATA.filter(r=>r.shop===s&&r.type==="ใบลดหนี้");
  const sI=inv.reduce((a,r)=>a+r.amount,0);
  const sC=cr.reduce((a,r)=>a+r.amount,0);
  document.getElementById("s1").textContent=fmt(sI);
  document.getElementById("s2").textContent=fmt(sC);
  document.getElementById("s3").textContent=fmt(sI+sC);
  rows(document.getElementById("b1"),inv);
  rows(document.getElementById("b2"),cr);
  document.getElementById("main").style.display="";
  document.getElementById("ph").style.display="none";
});
</script>
</body></html>
